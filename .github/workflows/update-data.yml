name: Update Monuments Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Update Monuments Data
        run: npm run update-data

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/monuments.geojson public/monuments.pbf public/stats-history.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update monuments data [skip ci]"
          committer: GitHub Actions <noreply@github.com>
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          branch: chore/update-monuments-data
          delete-branch: true
          title: "chore: update monuments data"
          body: |
            This PR contains automated updates to the monuments data.

            ---

            <sub>Auto-generated by [create-pull-request][1]</sub>

            [1]: https://github.com/peter-evans/create-pull-request
          labels: |
            automated-pr
            data-update
          draft: false
          add-paths: |
            public/monuments.geojson
            public/monuments.pbf
            public/stats-history.json
